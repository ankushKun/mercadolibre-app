<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mercado Libre URL Resolver</title>
  <link rel="stylesheet" href="/sdk/construct.css">
  <script src="/sdk/construct.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--c-bg, #0f0f12);
      color: var(--c-text, #e4e4ed);
      font-family: var(--c-font-sans, system-ui, -apple-system, "Segoe UI", sans-serif);
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 42rem;
      margin: 0 auto;
      padding: 32px 22px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .hero {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .badge {
      align-self: flex-start;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--c-text-muted, rgba(228,228,237,0.55));
      background: var(--c-surface, rgba(255,255,255,0.04));
      border: 1px solid var(--c-border, rgba(255,255,255,0.08));
      border-radius: 999px;
    }
    h1 {
      margin: 0;
      font-size: 1.65rem;
      letter-spacing: -0.03em;
    }
    .tagline {
      margin: 0;
      max-width: 36rem;
      font-size: 13px;
      line-height: 1.6;
      color: var(--c-text-secondary, rgba(228,228,237,0.72));
    }
    .mode-tabs, .actions, .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    button {
      font: inherit;
    }
    .mode-tab, .secondary-btn, .example-chip {
      background: var(--c-surface, rgba(255,255,255,0.04));
      color: var(--c-text-secondary, rgba(228,228,237,0.75));
      border: 1px solid var(--c-border, rgba(255,255,255,0.1));
      border-radius: 999px;
      padding: 7px 12px;
      cursor: pointer;
    }
    .mode-tab.active {
      color: #fff;
      background: var(--c-accent, #6366f1);
      border-color: var(--c-accent, #6366f1);
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .panel {
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    .panel.active {
      display: flex;
    }
    label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--c-text-muted, rgba(228,228,237,0.55));
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    input, textarea {
      box-sizing: border-box;
      width: 100%;
      background: var(--c-surface, rgba(255,255,255,0.04));
      color: var(--c-text, #e4e4ed);
      border: 1px solid var(--c-border, rgba(255,255,255,0.1));
      border-radius: var(--c-radius-md, 10px);
      padding: 11px 12px;
      font-family: var(--c-font-mono, "SF Mono", ui-monospace, monospace);
      font-size: 13px;
    }
    textarea {
      min-height: 132px;
      resize: vertical;
      line-height: 1.5;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--c-accent, #6366f1);
    }
    .resolve-btn {
      flex-shrink: 0;
      background: var(--c-accent, #6366f1);
      color: #fff;
      border: 1px solid var(--c-accent, #6366f1);
      border-radius: var(--c-radius-md, 10px);
      padding: 10px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .resolve-btn:disabled, .secondary-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .example-chip {
      font-family: var(--c-font-mono, "SF Mono", ui-monospace, monospace);
      font-size: 11px;
      padding: 5px 10px;
    }
    .result {
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      background: var(--c-surface, rgba(255,255,255,0.04));
      border: 1px solid var(--c-border, rgba(255,255,255,0.1));
      border-radius: var(--c-radius-md, 10px);
    }
    .result.visible { display: flex; }
    .result.error { border-color: var(--c-error, #ef4444); }
    .result-grid {
      display: grid;
      grid-template-columns: minmax(90px, 0.45fr) minmax(0, 1.55fr);
      gap: 8px 12px;
      font-size: 12.5px;
    }
    .label {
      color: var(--c-text-muted, rgba(228,228,237,0.55));
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 10px;
    }
    .value {
      min-width: 0;
      font-family: var(--c-font-mono, "SF Mono", ui-monospace, monospace);
      word-break: break-all;
    }
    .value a {
      color: var(--c-accent, #818cf8);
      text-decoration: none;
    }
    .value a:hover { text-decoration: underline; }
    .table-wrap {
      overflow: auto;
      border: 1px solid var(--c-border, rgba(255,255,255,0.08));
      border-radius: var(--c-radius-md, 10px);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
      font-size: 12px;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--c-border, rgba(255,255,255,0.08));
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--c-text-muted, rgba(228,228,237,0.55));
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      font-family: var(--c-font-mono, "SF Mono", ui-monospace, monospace);
      word-break: break-all;
    }
    tr:last-child td { border-bottom: 0; }
    .status-error { color: var(--c-error, #ef4444); }
    footer {
      display: flex;
      justify-content: center;
    }
    .github-link {
      color: var(--c-text-secondary, rgba(228,228,237,0.7));
      text-decoration: none;
      font-size: 12px;
    }
    .github-link:hover { color: var(--c-text, #e4e4ed); }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <span class="badge">Token-free resolver</span>
      <h1>Mercado Libre URL Resolver</h1>
      <p class="tagline">
        Resolve Mercado Libre product IDs into canonical product URLs and slugs. Use the resolved links with the browser when you need title, price, seller, or other visible page details.
      </p>
    </header>

    <div class="mode-tabs" role="tablist" aria-label="Resolve mode">
      <button type="button" class="mode-tab active" data-mode="single">Single</button>
      <button type="button" class="mode-tab" data-mode="batch">Batch</button>
    </div>

    <form id="resolve-form">
      <section class="panel active" id="single-panel">
        <label for="product-id">Product code or /p/ URL</label>
        <div class="input-row">
          <input id="product-id" name="product_id" type="text" placeholder="MLA19791378" autocomplete="off" spellcheck="false" />
          <button class="resolve-btn" type="submit" id="resolve-btn">Resolve</button>
        </div>
      </section>

      <section class="panel" id="batch-panel">
        <label for="product-ids">Product codes or pasted text</label>
        <textarea id="product-ids" name="product_ids" placeholder="MLA19791378&#10;MLA50469491&#10;MLA54262263" spellcheck="false"></textarea>
        <button class="resolve-btn" type="submit" id="batch-resolve-btn">Resolve batch</button>
      </section>

      <div class="examples" aria-label="Examples">
        <button type="button" class="example-chip" data-fill="MLA19791378">MLA19791378</button>
        <button type="button" class="example-chip" data-fill="MLA50469491">MLA50469491</button>
        <button type="button" class="example-chip" data-fill="MLA54262263">MLA54262263</button>
        <button type="button" class="example-chip" data-fill="https://www.mercadolibre.com.ar/p/MLA19791378">/p/ URL</button>
      </div>
    </form>

    <section id="result" class="result" aria-live="polite"></section>

    <footer>
      <a class="github-link" href="https://github.com/ankushKun/mercadolibre-app" target="_blank" rel="noopener noreferrer">
        View on GitHub
      </a>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
